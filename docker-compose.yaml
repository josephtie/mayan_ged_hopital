version: "3.8"

services:

  postgres:
    image: postgres:14
    container_name: mayan_postgres
    restart: always
    environment:
      POSTGRES_DB: mayan
      POSTGRES_USER: mayan
      POSTGRES_PASSWORD: mayan123
    volumes:
      - mayan_postgres_data:/var/lib/postgresql/data
    networks:
      - mayan_net

  redis:
    image: redis:7
    container_name: mayan_redis
    restart: always
    networks:
      - mayan_net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    container_name: mayan_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - mayan_elastic_data:/usr/share/elasticsearch/data
    networks:
      - mayan_net

  mayan:
    build: .
    image: mayan_fr:latest
    container_name: mayan_edms
    restart: always
    depends_on:
      - postgres
      - redis
      - elasticsearch
    environment:
      MAYAN_DATABASE_ENGINE: django.db.backends.postgresql
      MAYAN_DATABASE_HOST: postgres
      MAYAN_DATABASE_NAME: mayan
      MAYAN_DATABASE_USER: mayan
      MAYAN_DATABASE_PASSWORD: mayan123

      MAYAN_REDIS_URL: redis://redis:6379/0
      MAYAN_CELERY_BROKER_URL: redis://redis:6379/0
      MAYAN_ELASTICSEARCH_HOSTS: elasticsearch:9200
   

      # 🔹 LANGUE & LOCALISATION
      MAYAN_LANGUAGE_CODE: fr
      MAYAN_TIME_ZONE: Africa/Abidjan

      # 🔹 OCR FRANÇAIS
      MAYAN_OCR_BACKEND: mayan.apps.ocr.backends.tesseract.TesseractBackend
      MAYAN_OCR_LANGUAGE: fra

      MAYAN_ALLOWED_HOSTS: "*"
    ports:
      - "8030:8000"
    volumes:
      - mayan_media:/var/lib/mayan
    networks:
      - mayan_net

networks:
  mayan_net:
    driver: bridge

volumes:
  mayan_postgres_data:
  mayan_elastic_data:
  mayan_media:
